<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="feedback.css">
    <link rel="shortcut icon" href="./images/feedback.png" type="image/x-icon">
    <script src="validate.js"></script>
    <script src="script.js"></script>
</head>

<body>
    <div class="home">
        <a href="index.html"><img src="./images/home.png" alt=""></a>
    </div>

    <div class="logo">
        <img src="./images/logo.png">
    </div>

    <div class="feedback">
        <form action="/feedback" method="POST" onsubmit="return validateForm()">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter you Name:" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Email: " required>

            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write your Feedback:" required></textarea>

            <center><button type="submit" onclick="submitFeedback()">Send</button></center>
        </form>

    </div>

    <div class="icon">
        <ul>
            <li><a href="https://www.instagram.com/parkkrrr"><img class="icons" src="./images/insta.png"
                        title="Instagram"></a></li>
            <li><a href="https://www.github.com/parkkrrr"><img class="icons" src="./images/github-dark.png"
                        title="Github"></a></li>
            <li><a href="https://www.linkedin.com/in/prakharverma2019/"><img class="icons" src="./images/linkedin.png"
                        title="Linkedin"></a></li>
        </ul>
        <br>
        <center>
            <h5>&copy;2023 Parkkrrr</h5>
        </center>
    </div>
</body>

</html>
